version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_MODE=heuristic
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./models:/app/models:ro
      - ./ml:/app/ml:ro

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
